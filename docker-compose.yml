services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-this-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-config_center_dev}
      MYSQL_USER: ${MYSQL_USER:-cfg_app_dev}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.app
    restart: unless-stopped
    command: ["npm", "run", "start:api"]
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      MYSQL_HOST: mysql
      CONTEXT_HELPER_BASE_URL: http://context-helper:19101
      DIRECTDB_RUNNER_BASE_URL: http://directdb-runner:19102
      MODEL_TOOL_BASE_URL: http://model-tool:19103
      RAG_SERVICE_BASE_URL: http://rag:19104
      RAG_RUNTIME_MODE: external
    depends_on:
      mysql:
        condition: service_healthy
      context-helper:
        condition: service_started
      directdb-runner:
        condition: service_started
      model-tool:
        condition: service_started
      rag:
        condition: service_started
    volumes:
      - runtime-bundles:/app/.local/runtime-bundles
      - app-logs:/app/logs

  context-helper:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.app
    restart: unless-stopped
    command: ["npm", "run", "start:helper"]
    env_file:
      - .env
    environment:
      CONTEXT_HELPER_HOST: 0.0.0.0
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - runtime-bundles:/app/.local/runtime-bundles
      - app-logs:/app/logs

  directdb-runner:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.app
    restart: unless-stopped
    command: ["npm", "run", "start:directdb-runner"]
    env_file:
      - .env
    environment:
      DIRECTDB_RUNNER_HOST: 0.0.0.0
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - runtime-bundles:/app/.local/runtime-bundles
      - app-logs:/app/logs

  model-tool:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.app
    restart: unless-stopped
    command: ["npm", "run", "start:model-tool"]
    env_file:
      - .env
    environment:
      MODEL_TOOL_HOST: 0.0.0.0
    volumes:
      - runtime-bundles:/app/.local/runtime-bundles
      - app-logs:/app/logs

  rag:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.rag
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RAG_SEARCH_HOST: 0.0.0.0
      RAG_SEARCH_PORT: 19104
      RAG_DATA_DIR: /data
    volumes:
      - rag-data:/data

  console:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.console
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  mysql-data:
  rag-data:
  runtime-bundles:
  app-logs:

apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: openclaw-sales-agent-default
  version: v1
  title: OpenClaw Sales Agent Default LLM
  status: draft
spec:
  ref: tool://llm/openclaw-sales-agent-default@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: agent-runtime
    runtimeRef: openclaw/sales-agent
    secretPolicy: runtime-managed
  requestContract:
    requiredFields:
      - promptRef
      - request
      - facts
      - rules
    inputSources:
      promptRef: references.prompt
      request: request.normalized
      facts: facts.profile
      rules: references.rules
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 30000
    timeoutMsMax: 30000
    retryMaxAttempts: 1
  policy:
    allowedScenes:
      - sales-opportunity-advisor
      - sales-opportunity-advisor-directdb
      - sales-opportunity-smart-entry
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true

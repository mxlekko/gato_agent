apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: project-advisory-llm
  version: v1
  title: Project Advisory LLM
  status: draft
spec:
  ref: tool://llm/project-advisory@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: project-llm
    providerRef: env
    networkPolicy: provider-only
  requestContract:
    requiredFields:
      - prompt
      - request
      - facts
      - rules
      - schema
    inputSources:
      prompt: references.prompt
      request: request.normalized
      facts: facts.profile
      basisFields: facts.basis_fields
      knowledgeMatches: knowledge.matches
      rules: references.rules
      schema: references.output_schema
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 30000
    timeoutMsMax: 35000
    retryMaxAttempts: 1
  policy:
    allowedScenes:
      - sales-opportunity-advisor
      - sales-opportunity-advisor-directdb
      - sales-opportunity-smart-entry
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true

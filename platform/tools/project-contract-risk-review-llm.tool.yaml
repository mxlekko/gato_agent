apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: project-contract-risk-review-llm
  version: v1
  title: Project Contract Risk Review LLM
  status: draft
spec:
  ref: tool://llm/project-contract-risk-review@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: project-llm
    providerRef: env
    networkPolicy: provider-only
    provider: moonshot
    model: kimi-k2-turbo-preview
    temperature: 0
    maxTokens: 2048
  requestContract:
    requiredFields:
      - prompt
      - request
      - schema
    inputSources:
      prompt: references.prompt
      request: artifacts.document
      schema: references.output_schema
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 60000
    timeoutMsMax: 90000
    retryMaxAttempts: 1
  policy:
    allowTemplateScenes: true
    allowedScenes:
      - non-standard-contract-risk-review
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true

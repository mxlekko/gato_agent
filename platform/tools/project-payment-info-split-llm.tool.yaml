apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: project-payment-info-split-llm
  version: v1
  title: Project Payment Info Split LLM
  status: draft
spec:
  ref: tool://llm/project-payment-info-split@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: project-llm
    providerRef: env
    networkPolicy: provider-only
    provider: moonshot
    model: kimi-k2-turbo-preview
    temperature: 0
    maxTokens: 256
  requestContract:
    requiredFields:
      - prompt
      - request
      - schema
    inputSources:
      prompt: references.prompt
      request: request.normalized
      schema: references.output_schema
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 30000
    timeoutMsMax: 60000
    retryMaxAttempts: 1
  policy:
    allowTemplateScenes: true
    allowedScenes:
      - payment-info-split
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true

apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: project-product-solution-llm
  version: v1
  title: Project Product Solution LLM
  status: draft
spec:
  ref: tool://llm/project-product-solution@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: project-llm
    providerRef: env
    networkPolicy: provider-only
  requestContract:
    requiredFields:
      - prompt
      - request
      - knowledge
      - schema
    inputSources:
      prompt: references.prompt
      request: request.normalized
      knowledgeMatches: knowledge.matches
      schema: references.output_schema
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 30000
    timeoutMsMax: 35000
    retryMaxAttempts: 1
  policy:
    allowedScenes:
      - special-custom-product-solution
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true

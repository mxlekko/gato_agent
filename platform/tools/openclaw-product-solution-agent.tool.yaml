apiVersion: agent.platform/v1alpha1
kind: ToolDefinition
metadata:
  name: openclaw-product-solution-agent
  version: v1
  title: OpenClaw Product Solution Agent
  status: draft
spec:
  ref: tool://llm/openclaw-product-solution-agent@v1
  toolRole: advisory_llm
  category: llm
  driver:
    type: agent-runtime
    runtimeRef: openclaw/sales-agent
    secretPolicy: runtime-managed
  requestContract:
    requiredFields:
      - prompt
      - request
      - knowledge
      - schema
    inputSources:
      prompt: references.prompt
      request: request.normalized
      knowledge: artifacts.knowledge.matches
      schema: references.output_schema
  responseContract:
    resultPath: draft.payload
    errorPath: error
  limits:
    timeoutMsDefault: 30000
    timeoutMsMax: 30000
    retryMaxAttempts: 1
  policy:
    allowedScenes:
      - special-custom-product-solution
    deny:
      providerKeyOverride: true
      inlinePromptText: true
      externalProviderEndpoint: true
